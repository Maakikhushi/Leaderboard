<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #0b1220;
  display: flex;
  justify-content: center;
  color: white;
}

.container {
  width: 100%;
  max-width: 420px;
  padding: 10px;
}

h2 {
  text-align: center;
  font-size: 16px;
}

.top {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 12px;
}

.player {
  text-align: center;
  position: relative;
}

.avatar {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 3px solid gold;
  animation: glow 2s infinite;
}

.crown {
  position: absolute;
  top: -14px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 18px;
  animation: crownJump 1s ease;
}

@keyframes crownJump {
  0% { transform: translate(-50%, -10px); }
  50% { transform: translate(-50%, -20px); }
  100% { transform: translate(-50%, -10px); }
}

@keyframes glow {
  0% { box-shadow: 0 0 8px rgba(255,215,0,0.4); }
  50% { box-shadow: 0 0 18px rgba(255,215,0,0.9); }
  100% { box-shadow: 0 0 8px rgba(255,215,0,0.4); }
}

.list {
  background: #111827;
  border-radius: 12px;
  padding: 6px;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px;
  border-radius: 10px;
  margin-bottom: 6px;
  background: #1f2937;
  transition: transform 0.4s ease, background 0.4s ease;
}

.left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.rank {
  width: 20px;
  font-size: 12px;
}

.small-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
}

.score {
  background: #0f172a;
  padding: 4px 10px;
  border-radius: 8px;
  color: #a3e635;
  font-weight: bold;
}

/* 🔥 movement feedback */
.move-up {
  background: rgba(16,185,129,0.25);
}

.move-down {
  background: rgba(239,68,68,0.25);
}

/* 🎯 rank change badge */
.delta {
  font-size: 10px;
  margin-left: 4px;
}

.up { color: #22c55e; }
.down { color: #ef4444; }

</style>
</head>

<body>

<div class="container">
  <h2>🏆 Leaderboard</h2>
  <div class="top" id="top"></div>
  <div class="list" id="list"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbw5bdTrnLF5mtzqIpElHnd-wvQDf_Rc-if73UsDWLnNZYPqsU9I367uyKUhbejZ8Wd3aA/exec";

let rowMap = {};
let previousPositions = {};

async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();

  data.sort((a,b)=>b.score-a.score);

  const list = document.getElementById("list");
  const topContainer = document.getElementById("top");

  // ---------- TOP ----------
  const topScore = data[0]?.score;
  const leaders = data.filter(p => p.score === topScore);

  topContainer.innerHTML = "";

  leaders.forEach(p => {
    const div = document.createElement("div");
    div.className = "player";
    div.innerHTML = `
      <div class="crown">👑</div>
      <img class="avatar" src="${p.photo}">
      <div>${p.name}</div>
      <div style="color:#a3e635;font-weight:bold">${p.score}</div>
    `;
    topContainer.appendChild(div);
  });

  // ---------- FLIP START ----------
  const first = {};
  Object.keys(rowMap).forEach(name => {
    first[name] = rowMap[name].getBoundingClientRect().top;
  });

  // ---------- RENDER ----------
  data.forEach((item, index) => {

    let row = rowMap[item.name];

    if(!row){
      row = document.createElement("div");
      row.className = "row";

      row.innerHTML = `
        <div class="left">
          <div class="rank"></div>
          <img class="small-avatar">
          <div class="name"></div>
        </div>
        <div class="score"></div>
      `;

      rowMap[item.name] = row;
    }

    const oldIndex = previousPositions[item.name];
    const newIndex = index;

    const delta = oldIndex !== undefined ? oldIndex - newIndex : 0;

    row.querySelector(".rank").innerText = index + 1;
    row.querySelector(".name").innerHTML = `
      ${item.name}
      ${delta > 0 ? `<span class="delta up">+${delta}</span>` : ""}
      ${delta < 0 ? `<span class="delta down">${delta}</span>` : ""}
    `;
    row.querySelector(".score").innerText = item.score;
    row.querySelector(".small-avatar").src = item.photo;

    // movement color
    row.classList.remove("move-up","move-down");
    if(delta > 0) row.classList.add("move-up");
    if(delta < 0) row.classList.add("move-down");

    setTimeout(()=>row.classList.remove("move-up","move-down"),600);

    list.appendChild(row);
    previousPositions[item.name] = newIndex;
  });

  // ---------- FLIP ANIMATION ----------
  Object.keys(rowMap).forEach(name => {
    const row = rowMap[name];

    const last = row.getBoundingClientRect().top;
    const prev = first[name];

    if(prev !== undefined){
      const diff = prev - last;

      if(diff){
        row.style.transform = `translateY(${diff}px)`;
        requestAnimationFrame(()=>{
          row.style.transform = "";
        });
      }
    }
  });
}

setInterval(loadData, 4000);
loadData();
</script>

</body>
</html>
